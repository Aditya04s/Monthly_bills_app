<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Offline-first mobile bill app" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="Bill App" />
    <meta name="apple-mobile-web-app-title" content="Bill App" />
    <link rel="icon" type="image/svg+xml" href="/Monthly_bills_app/favicon.svg" />
    <link rel="apple-touch-icon" href="/Monthly_bills_app/icons/icon-192.png" />
    <script>
      (() => {
        try {
          const mode = window.localStorage.getItem('bill-app-theme') || 'system';
          const dark =
            mode === 'dark' ||
            (mode !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute('content', dark ? '#020617' : '#f8fafc');
        } catch {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <title>Bill App</title>
    <script type="module" crossorigin src="/Monthly_bills_app/assets/index-0z12mZZc.js"></script>
    <link rel="stylesheet" crossorigin href="/Monthly_bills_app/assets/index-D_36z-Z6.css">
  <link rel="manifest" href="/Monthly_bills_app/manifest.webmanifest"></head>
  <body>
    <div id="root"></div>
  </body>
</html>
